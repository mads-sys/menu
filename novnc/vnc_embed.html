<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
        #screen { width: 100%; height: 100%; }
        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            z-index: 10;
            transition: opacity 0.4s;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status-text { font-size: 14px; color: #94a3b8; }
        #error-text { font-size: 13px; color: #f87171; display: none; text-align: center; max-width: 320px; }
    </style>
</head>
<body>
    <div id="screen"></div>
    <div id="overlay">
        <div class="spinner" id="spinner"></div>
        <div id="status-text">Conectando...</div>
        <div id="error-text"></div>
    </div>

    <script type="module">
        const overlay   = document.getElementById('overlay');
        const statusEl  = document.getElementById('status-text');
        const errorEl   = document.getElementById('error-text');
        const spinnerEl = document.getElementById('spinner');

        function setStatus(msg) { statusEl.textContent = msg; }
        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            spinnerEl.style.display = 'none';
            statusEl.style.display = 'none';
        }
        function hideOverlay() {
            overlay.classList.add('hidden');
        }

        const params   = new URLSearchParams(window.location.search);
        const host     = params.get('host') || window.location.hostname || '127.0.0.1';
        const port     = params.get('port') || '6080';
        const wsPath   = params.get('path') || 'websockify';
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl    = `${protocol}://${host}:${port}/${wsPath}`;

        try {
            setStatus('Carregando cliente VNC...');
            const { default: RFB } = await import('./core/rfb.js');

            setStatus('Conectando ao display remoto...');
            const rfb = new RFB(document.getElementById('screen'), wsUrl);

            rfb.scaleViewport = true;
            rfb.resizeSession = false;

            rfb.addEventListener('connect', () => {
                hideOverlay();
                try { window.parent.postMessage({ type: 'vnc_connected' }, '*'); } catch(e) {}
            });

            rfb.addEventListener('disconnect', (e) => {
                const clean = e.detail.clean;
                overlay.classList.remove('hidden');
                spinnerEl.style.display = clean ? 'none' : 'none';
                showError(clean ? 'Sessão encerrada.' : 'Conexão perdida com o display remoto.');
                try { window.parent.postMessage({ type: 'vnc_disconnected', clean }, '*'); } catch(e) {}
            });

            rfb.addEventListener('credentialsrequired', () => {
                const pwd = prompt('Senha VNC:') || '';
                rfb.sendCredentials({ password: pwd });
            });

            rfb.addEventListener('securityfailure', (e) => {
                showError('Falha de autenticação: ' + (e.detail.reason || 'senha incorreta'));
            });

            rfb.addEventListener('desktopname', (e) => {
                document.title = e.detail.name || 'VNC';
            });

            window.rfbClient = {
                disconnect:     () => rfb?.disconnect(),
                sendCtrlAltDel: () => rfb?.sendCtrlAltDel(),
            };

        } catch(err) {
            showError('Erro: ' + err.message);
            console.error('[VNC]', err);
            try { window.parent.postMessage({ type: 'vnc_disconnected', clean: false }, '*'); } catch(e) {}
        }
    </script>
</body>
</html>
